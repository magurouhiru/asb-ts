  #     - open-webui_data:/app/backend/data
  #   restart: unless-stopped
  #   depends_on:
  #     - ollama
  #   networks:
  #     - ai-network

volumes:
  ollama_data:
  # open-webui_data:

networks:
  ai-network:
    driver: bridge