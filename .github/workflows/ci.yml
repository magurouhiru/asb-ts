name: cicd

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: install package dependencies
        run: bun install --frozen-lockfile

      - name: check (biome)
        run: bun run biome

      - name: test
        run: bun run test

      - name: build web
        run: bun run build:apps:web

      - name: build discord bot image
        run: docker build -f discord-bot.Dockerfile .

      - name: Upload static files as artifact
        if: github.event_name == 'push'
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist/

  deploy-pages:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  push-discord-bot-image:
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    # if: github.event_name == 'push'
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: asb-ts_discord-bot
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date
        id: date
        run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: build discord bot image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.CURRENT_DATE }} -f discord-bot.Dockerfile .

      - name: push discord bot image
        run: docker push -a ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
