name: cicd

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: checkout code
        uses: actions/checkout@v5
        with:
          lfs: true
      - name: install package dependencies
        run: bun ci
      - name: check
        run: bun biome
      - name: test
        run: bun test
      - name: build
        run: bun run build
      - name: Upload static files as artifact
        if: github.event_name == 'push'
        id: deployment
        uses: actions/upload-pages-artifact@v3 # or specific "vX.X.X" version tag for this action
        with:
          path: packages/asb-web/dist/
  
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
