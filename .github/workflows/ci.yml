name: cicd

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: install package dependencies
        run: pnpm install --frozen-lockfile

      - name: check (biome)
        run: pnpm run biome

      - name: test
        run: pnpm run test

      - name: build
        run: pnpm run build

      - name: Upload static files as artifact
        if: github.event_name == 'push'
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist/

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4